<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人收支管理 - 设置</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="nav-bar">
        <div class="nav-brand">
            <i class="fas fa-chart-line"></i>
            <span>个人收支管理</span>
        </div>
        <div class="nav-actions">
            <button class="btn-icon"><i class="fas fa-bell"></i></button>
            <button class="btn-icon"><i class="fas fa-user"></i></button>
        </div>
    </nav>

    <div class="app-layout">
        <!-- 左侧导航栏 -->
        <nav class="sidebar">
            <div class="nav-menu">
                <h3><i class="fas fa-chart-pie"></i> 财务仪表盘</h3>
                <ul>
                    <li><a href="dashboard.html"><i class="fas fa-home"></i> 仪表盘</a></li>
                    <li><a href="transactions.html"><i class="fas fa-list"></i> 收支记录</a></li>
                    <li><a href="budget.html"><i class="fas fa-wallet"></i> 预算规划</a></li>
                    <li><a href="accounts.html"><i class="fas fa-credit-card"></i> 账户管理</a></li>
                    <li><a href="analysis.html"><i class="fas fa-chart-bar"></i> 账单分析</a></li>
                    <li><a href="settings.html" class="active"><i class="fas fa-cog"></i> 设置</a></li>
                </ul>
            </div>
        </nav>

        <!-- 主要内容区 -->
        <main class="container">
            <!-- 页面标题 -->
            <div class="page-header">
                <h1>设置</h1>
            </div>

            <!-- 设置选项卡 -->
            <div class="settings-tabs">
                <button class="tab-btn active" onclick="switchTab('profile')">
                    <i class="fas fa-user"></i> 个人信息
                </button>
                <button class="tab-btn" onclick="switchTab('preferences')">
                    <i class="fas fa-sliders-h"></i> 偏好设置
                </button>
                <button class="tab-btn" onclick="switchTab('notifications')">
                    <i class="fas fa-bell"></i> 通知设置
                </button>
                <button class="tab-btn" onclick="switchTab('security')">
                    <i class="fas fa-shield-alt"></i> 安全设置
                </button>
                <button class="tab-btn" onclick="switchTab('data')">
                    <i class="fas fa-database"></i> 数据管理
                </button>
            </div>

            <!-- 个人信息设置 -->
            <section id="profile" class="settings-section active">
                <div class="settings-card">
                    <div class="settings-header">
                        <h2>个人信息</h2>
                        <button class="btn btn-primary" onclick="saveProfile()">保存修改</button>
                    </div>
                    <div class="settings-content">
                        <div class="avatar-section">
                            <div class="avatar-preview">
                                <img src="https://via.placeholder.com/100" alt="用户头像">
                            </div>
                            <button class="btn btn-outline">
                                <i class="fas fa-camera"></i> 更换头像
                            </button>
                        </div>
                        <div class="form-group">
                            <label>用户名</label>
                            <input type="text" class="form-control" value="示例用户">
                        </div>
                        <div class="form-group">
                            <label>电子邮箱</label>
                            <input type="email" class="form-control" value="example@email.com">
                        </div>
                        <div class="form-group">
                            <label>手机号码</label>
                            <input type="tel" class="form-control" value="13800138000">
                        </div>
                    </div>
                </div>
            </section>

            <!-- 偏好设置 -->
            <section id="preferences" class="settings-section">
                <div class="settings-card">
                    <div class="settings-header">
                        <h2>偏好设置</h2>
                        <button class="btn btn-primary" onclick="savePreferences()">保存修改</button>
                    </div>
                    <div class="settings-content">
                        <div class="form-group">
                            <label>默认货币</label>
                            <select class="form-control">
                                <option value="CNY" selected>人民币 (CNY)</option>
                                <option value="USD">美元 (USD)</option>
                                <option value="EUR">欧元 (EUR)</option>
                                <option value="JPY">日元 (JPY)</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>日期格式</label>
                            <select class="form-control">
                                <option value="YYYY-MM-DD" selected>YYYY-MM-DD</option>
                                <option value="DD/MM/YYYY">DD/MM/YYYY</option>
                                <option value="MM/DD/YYYY">MM/DD/YYYY</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>主题</label>
                            <select class="form-control">
                                <option value="light" selected>浅色</option>
                                <option value="dark">深色</option>
                                <option value="system">跟随系统</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>语言</label>
                            <select class="form-control">
                                <option value="zh-CN" selected>简体中文</option>
                                <option value="en">English</option>
                                <option value="ja">日本語</option>
                            </select>
                        </div>
                    </div>
                </div>
            </section>

            <!-- 通知设置 -->
            <section id="notifications" class="settings-section">
                <div class="settings-card">
                    <div class="settings-header">
                        <h2>通知设置</h2>
                        <button class="btn btn-primary" onclick="saveNotifications()">保存修改</button>
                    </div>
                    <div class="settings-content">
                        <div class="notification-group">
                            <h3>预算提醒</h3>
                            <div class="switch-item">
                                <span>预算超支提醒</span>
                                <label class="switch">
                                    <input type="checkbox" checked>
                                    <span class="slider"></span>
                                </label>
                            </div>
                            <div class="switch-item">
                                <span>预算即将用完提醒</span>
                                <label class="switch">
                                    <input type="checkbox" checked>
                                    <span class="slider"></span>
                                </label>
                            </div>
                        </div>
                        <div class="notification-group">
                            <h3>账单提醒</h3>
                            <div class="switch-item">
                                <span>大额支出提醒</span>
                                <label class="switch">
                                    <input type="checkbox" checked>
                                    <span class="slider"></span>
                                </label>
                            </div>
                            <div class="switch-item">
                                <span>定期账单提醒</span>
                                <label class="switch">
                                    <input type="checkbox" checked>
                                    <span class="slider"></span>
                                </label>
                            </div>
                        </div>
                        <div class="notification-group">
                            <h3>其他通知</h3>
                            <div class="switch-item">
                                <span>每周收支报告</span>
                                <label class="switch">
                                    <input type="checkbox" checked>
                                    <span class="slider"></span>
                                </label>
                            </div>
                            <div class="switch-item">
                                <span>系统更新提醒</span>
                                <label class="switch">
                                    <input type="checkbox" checked>
                                    <span class="slider"></span>
                                </label>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- 安全设置 -->
            <section id="security" class="settings-section">
                <div class="settings-card">
                    <div class="settings-header">
                        <h2>安全设置</h2>
                    </div>
                    <div class="settings-content">
                        <div class="security-item">
                            <div class="security-info">
                                <h3>登录密码</h3>
                                <p class="text-muted">上次修改时间：2024-01-01</p>
                            </div>
                            <button class="btn btn-outline" onclick="showChangePasswordModal()">
                                修改密码
                            </button>
                        </div>
                        <div class="security-item">
                            <div class="security-info">
                                <h3>两步验证</h3>
                                <p class="text-muted">使用手机验证码或认证器进行双重认证</p>
                            </div>
                            <button class="btn btn-outline" onclick="showTwoFactorModal()">
                                设置
                            </button>
                        </div>
                        <div class="security-item">
                            <div class="security-info">
                                <h3>登录设备管理</h3>
                                <p class="text-muted">查看并管理已登录的设备</p>
                            </div>
                            <button class="btn btn-outline" onclick="showDevicesModal()">
                                查看设备
                            </button>
                        </div>
                    </div>
                </div>
            </section>

            <!-- 数据管理 -->
            <section id="data" class="settings-section">
                <div class="settings-card">
                    <div class="settings-header">
                        <h2>数据管理</h2>
                    </div>
                    <div class="settings-content">
                        <div class="data-action-group">
                            <h3>数据备份</h3>
                            <p class="text-muted">将您的账单数据导出备份</p>
                            <div class="action-buttons">
                                <button class="btn btn-outline" onclick="exportData('excel')">
                                    <i class="fas fa-file-excel"></i> 导出Excel
                                </button>
                                <button class="btn btn-outline" onclick="exportData('csv')">
                                    <i class="fas fa-file-csv"></i> 导出CSV
                                </button>
                                <button class="btn btn-outline" onclick="exportData('json')">
                                    <i class="fas fa-file-code"></i> 导出JSON
                                </button>
                            </div>
                        </div>
                        <div class="data-action-group">
                            <h3>数据导入</h3>
                            <p class="text-muted">从其他来源导入账单数据</p>
                            <div class="action-buttons">
                                <button class="btn btn-outline" onclick="showImportModal()">
                                    <i class="fas fa-file-import"></i> 导入数据
                                </button>
                            </div>
                        </div>
                        <div class="data-action-group danger-zone">
                            <h3>危险操作</h3>
                            <p class="text-muted">请谨慎操作，这些操作可能无法撤销</p>
                            <div class="action-buttons">
                                <button class="btn btn-danger" onclick="showClearDataModal()">
                                    <i class="fas fa-trash-alt"></i> 清空所有数据
                                </button>
                                <button class="btn btn-danger" onclick="showDeleteAccountModal()">
                                    <i class="fas fa-user-times"></i> 注销账号
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        function switchTab(tabId) {
            // 隐藏所有设置区域
            document.querySelectorAll('.settings-section').forEach(section => {
                section.classList.remove('active');
            });
            // 取消所有标签页的激活状态
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            // 显示选中的设置区域
            document.getElementById(tabId).classList.add('active');
            // 激活选中的标签页
            event.target.classList.add('active');
        }

        function saveProfile() {
            // 实现保存个人信息的逻辑
            alert('个人信息已保存');
        }

        function savePreferences() {
            // 实现保存偏好设置的逻辑
            alert('偏好设置已保存');
        }

        function saveNotifications() {
            // 实现保存通知设置的逻辑
            alert('通知设置已保存');
        }

        function showChangePasswordModal() {
            // 显示修改密码的模态框
            alert('显示修改密码模态框');
        }

        function showTwoFactorModal() {
            // 显示两步验证设置的模态框
            alert('显示两步验证设置模态框');
        }

        function showDevicesModal() {
            // 显示设备管理的模态框
            alert('显示设备管理模态框');
        }

        function showImportModal() {
            // 显示数据导入的模态框
            alert('显示数据导入模态框');
        }

        function showClearDataModal() {
            // 显示清空数据确认的模态框
            if (confirm('确定要清空所有数据吗？此操作不可撤销！')) {
                alert('数据已清空');
            }
        }

        function showDeleteAccountModal() {
            // 显示注销账号确认的模态框
            if (confirm('确定要注销账号吗？此操作不可撤销！')) {
                alert('账号已注销');
            }
        }

        function exportData(format) {
            // 实现数据导出的逻辑
            alert(`数据已导出为${format}格式`);
        }
